<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Order AsSip Tea (COD)</title>
  <style>
    :root{--green:#16392c;--gold:#d4af37;--cream:#f9f2e4}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(120deg,#0f2f24,#1f4f3d);color:var(--cream);min-height:100vh;display:grid;place-items:center;padding:1rem}
    .box{width:min(100%,560px);background:#ffffff;color:#222;border-radius:16px;padding:1rem 1rem 1.3rem;box-shadow:0 18px 45px rgba(0,0,0,.35)}
    h1{margin:.2rem 0 1rem;color:var(--green)}
    .summary{background:#f4efe6;padding:.7rem;border-radius:10px;margin-bottom:.9rem}
    form{display:grid;gap:.65rem}
    label{font-weight:600;color:#21352d}
    input,textarea,select{width:100%;padding:.65rem;border-radius:8px;border:1px solid #cacaca;font:inherit}
    .payment{background:#f7f7f7;border:1px solid #ddd;padding:.65rem;border-radius:10px}
    button{border:0;background:var(--green);color:#fff;padding:.75rem 1rem;border-radius:999px;font-weight:700;cursor:pointer}
    .order-id{font-weight:700;color:#0f553f}
    .help{font-size:.9rem;color:#555}
  </style>
</head>
<body>
  <div class="box">
    <h1>Complete Your Order</h1>
    <div class="summary">
      <p id="product"></p>
      <p id="price"></p>
      <p><strong>Payment Gateway:</strong> Cash on Delivery (COD) only</p>
    </div>

    <form id="orderForm">
      <label>Full Name <input name="name" type="text" required></label>
      <label>Phone Number <input name="phone" type="tel" required></label>
      <label>Delivery Address <textarea name="address" rows="3" required placeholder="House no, area, city, pincode"></textarea></label>

      <div class="payment">
        <label>Payment Option
          <select name="payment" required>
            <option value="Cash on Delivery">Cash on Delivery (COD)</option>
          </select>
        </label>
      </div>

      <button type="submit">Place Order & Send to WhatsApp</button>
      <p id="orderInfo" class="help"></p>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const product = params.get('product') || 'AsSip Tea';
    const price = params.get('price') || '0';

    document.getElementById('product').textContent = `Product: ${product}`;
    document.getElementById('price').textContent = `Price: ₹${price}`;

    function generateOrderId(){
      const datePart = new Date().toISOString().slice(0,10).replace(/-/g,'');
      const rand = Math.random().toString(36).slice(2,7).toUpperCase();
      return `ASSIP-${datePart}-${rand}`;
    }

    document.getElementById('orderForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const orderId = generateOrderId();
      const name = formData.get('name');
      const phone = formData.get('phone');
      const address = formData.get('address');
      const payment = formData.get('payment');

      const msg = `New AsSip Order%0AOrder ID: ${orderId}%0AProduct: ${encodeURIComponent(product)}%0APrice: ₹${price}%0AName: ${encodeURIComponent(name)}%0APhone: ${encodeURIComponent(phone)}%0AAddress: ${encodeURIComponent(address)}%0APayment: ${encodeURIComponent(payment)}`;
      const whatsappUrl = `https://wa.me/917086415656?text=${msg}`;

      document.getElementById('orderInfo').innerHTML = `Your order ID is <span class="order-id">${orderId}</span>. Redirecting to WhatsApp...`;
      localStorage.setItem('assipLastOrder', JSON.stringify({ orderId, product, price, name, phone, address, payment, createdAt: new Date().toISOString() }));

      setTimeout(() => {
        window.location.href = whatsappUrl;
      }, 600);
    });
  </script>
</body>
</html>
